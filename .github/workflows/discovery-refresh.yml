name: Weekly Discovery Refresh

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      llm_mode:
        description: "Discovery LLM mode"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - off
          - required

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run discovery refresh
        run: |
          python discover.py --llm-mode "${{ github.event.inputs.llm_mode || 'auto' }}"

      - name: Upload refresh artifacts
        uses: actions/upload-artifact@v4
        with:
          name: discovery-refresh-artifacts
          path: build/

      - name: Commit refreshed deadline data
        run: |
          if [ -z "$(git status --porcelain -- data/deadlines)" ]; then
            echo "No deadline data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/deadlines
          git commit -m "chore: refresh discovered deadlines"
          git push origin HEAD:main
