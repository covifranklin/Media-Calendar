name: Weekly Discovery Refresh

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "Discovery refresh mode"
        required: false
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - apply
      llm_mode:
        description: "Discovery LLM mode"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - off
          - required

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      DISCOVERY_MODE: ${{ github.event.inputs.mode || 'dry-run' }}
      DISCOVERY_LLM_MODE: ${{ github.event.inputs.llm_mode || 'auto' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Generate source coverage report
        run: python coverage_report.py

      - name: Run discovery refresh
        run: |
          python discover.py --mode "${DISCOVERY_MODE}" --llm-mode "${DISCOVERY_LLM_MODE}"

      - name: Upload refresh artifacts
        uses: actions/upload-artifact@v4
        with:
          name: discovery-monitoring-artifacts
          path: |
            build/coverage-report.json
            build/coverage-report.md
            build/source-freshness.json
            build/source-freshness.md
            build/discovery-refresh.json
            build/discovery-refresh.md
            build/discovery-metrics.json
            build/discovery-metrics.md
            build/discovery-log.jsonl
            build/source_snapshots/

      - name: Commit refreshed deadline data
        if: env.DISCOVERY_MODE == 'apply'
        run: |
          if [ -z "$(git status --porcelain -- data/deadlines)" ]; then
            echo "No deadline data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/deadlines
          git commit -m "chore: refresh discovered deadlines"
          git push origin HEAD:main
