name: Weekly Notifications

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview notifications without sending"
        required: false
        default: true
        type: boolean
      notification_date:
        description: "Optional notification date override in YYYY-MM-DD format"
        required: false
        default: ""
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      RESEND_FROM_NAME: ${{ secrets.RESEND_FROM_NAME }}
      NOTIFICATION_TO_EMAIL: ${{ secrets.NOTIFICATION_TO_EMAIL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run notifications
        run: |
          args=()
          if [ -n "${{ github.event.inputs.notification_date }}" ]; then
            args+=(--date "${{ github.event.inputs.notification_date }}")
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            args+=(--use-latest-monday)
          fi

          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            args+=(--dry-run)
          fi

          python notify.py "${args[@]}"

      - name: Upload notification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notification-artifacts
          path: build/
